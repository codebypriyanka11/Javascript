        #abcd{

            width: 400px;
            height: 400px;
            background-color: red;
            transition: all cubic-bezier(0.19, 1, 0.22, 1) 1s;
        
        }

        /* this also use in event bubbling */
        body{

            overflow: hidden;
        }
